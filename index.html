<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>
    
    <form class="weatherForm">
        <input type = "text" class="cityInput" placeholder="Enter city or ZIP code">
        <button type="submit">Get Weather</button>
    </form>

    <div class="card">
        <h1 class="cityDisplay">Cape Girardeau</h1>
        <p class="zipDisplay">63701</p>
        <p class="tempDisplay">67°F</p>
        <p class="feelDisplay">67°F</p>
        <p class="windDisplay">3.4 mph ENE</p>
        <p class="humidityDisplay">Humidity: 70%</p>
        <p class="uvDisplay">4 UV</p>
        <p class="descDisplay">Scattered Clouds</p>
        <p class="weatherEmoji">☁️</p>
        <p class="errorDisplay">Please enter a city or ZIP code</p>
    </div>

    <script src="index.js"></script>
</body>
</html>

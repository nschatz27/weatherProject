<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="./css/styles.css">

</head>
<body>
    
    <form class="weatherForm">
        <input type = "text" class="cityInput" placeholder="Enter city">
        <button type="submit">Get Weather</button>
    </form>

    <div class="card" style="display: none">
        <h1 class="cityDisplay">Cape Girardeau</h1>
        <p class="tempDisplay">67°F</p>
        <p class="feelDisplay">Feels like: 67°F</p>
        <p class="windDisplay">Wind: 3.4 mph ENE</p>
        <p class="humidityDisplay">Humidity: 70%</p>
        <p class="descDisplay">Scattered Clouds</p>
        <p class="weatherEmoji">☁️</p>
        <p class="errorDisplay">Please enter a city</p>
    </div>

    <script src="./js/index.js"></script>
</body>
</html>
